<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fonksiyon Labirenti</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --portal: #a855f7;
            --text: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        /* Geri Bildirim Animasyonları */
        .flash-success { animation: flashG 0.5s ease-out; }
        .flash-error { animation: flashR 0.5s ease-out, shake 0.4s; }
        @keyframes flashG { 0% { box-shadow: inset 0 0 100px var(--success); } 100% { box-shadow: inset 0 0 0 transparent; } }
        @keyframes flashR { 0% { box-shadow: inset 0 0 100px var(--danger); } 100% { box-shadow: inset 0 0 0 transparent; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .game-container { width: 100vw; height: 100vh; max-width: 800px; display: flex; flex-direction: column; padding: 10px; }

        /* Üst Bilgi Barı */
        .stats { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar { color: var(--success); font-weight: 900; font-size: 1.2rem; }
        #status { font-weight: bold; color: var(--accent); font-size: 0.9rem; }

        /* Oyun Alanı */
        #viewport { 
            position: relative; flex-grow: 1; background: rgba(0,0,0,0.2); 
            border-radius: 15px; overflow-y: auto; overflow-x: hidden; border: 1px solid #334155;
            padding: 10px; scroll-behavior: smooth;
        }
        #grid { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; width: 100%; position: relative; z-index: 10;
        }

        /* Mobil Grid Ayarı: 5 Sütun ve Kare Kutular */
        @media (max-width: 600px) {
            #grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
        }

        .cell {
            aspect-ratio: 1 / 1; /* Kutuların kare kalmasını sağlayan kritik kod */
            background: #1e293b; border-radius: 8px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold; 
            color: #475569; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative;
        }
        .cell.active { border-color: var(--accent); background: #334155; box-shadow: 0 0 15px var(--accent); z-index: 11; }
        .cell.portal { border-color: var(--portal); color: var(--portal); }
        .cell.trap { border-color: var(--danger); color: var(--danger); }
        .cell.finish { background: var(--success); color: white; border: none; }

        /* SVG Yol Çizimi */
        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .line { stroke: var(--accent); stroke-width: 2; opacity: 0.2; fill: none; stroke-dasharray: 5; }

        #player {
            width: 22px; height: 22px; background: #fff; border-radius: 4px;
            position: absolute; z-index: 100; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px #fff; border: 2px solid var(--accent);
            transform: translate(-50%, -50%); pointer-events: none;
        }

        /* Kontroller */
        .controls { height: 90px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .dice { width: 50px; height: 50px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #000; }
        .btn {
            padding: 12px 30px; border-radius: 10px; border: none; background: var(--accent); color: #000;
            font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #0369a1;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0369a1; }

        /* Soru Modalı */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .q-box { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 2px solid var(--accent); }
        input { width: 100%; padding: 15px; margin: 20px 0; background: #0f172a; border: 1px solid #334155; color: white; font-size: 1.5rem; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats">
            <div class="hp-bar">HP: <span id="hp">100</span></div>
            <div id="status">ZAR AT</div>
            <div style="font-weight: bold; opacity: 0.6;">KONUM: <span id="pos">0</span></div>
        </div>

        <div id="viewport">
            <svg id="svg-layer"><path id="path-line" class="line" /></svg>
            <div id="grid"></div>
            <div id="player"></div>
        </div>

        <div class="controls">
            <div id="dice-val" class="dice">?</div>
            <button class="btn" id="roll-btn" onclick="game.roll()">ZAR AT</button>
        </div>
    </div>

    <div id="modal">
        <div class="q-box">
            <div id="q-text" style="font-size: 1.3rem; margin-bottom: 10px; line-height: 1.5;"></div>
            <input type="number" id="q-input" pattern="\d*" placeholder="Cevap">
            <button class="btn" style="width: 100%" onclick="game.submit()">ONAYLA</button>
        </div>
    </div>

<script>
    const game = {
        hp: 100, pos: 0, moving: false,
        portals: { 7: 15, 22: 35, 12: 3, 44: 38 },

        init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<50; i++) {
                let type = 'normal', label = i;
                const r = Math.random();
                if(i===0) label = 'BAŞLA';
                else if(i===49) { type='finish'; label='BİTİŞ'; }
                else if(this.portals[i]) { type='portal'; label='P'; }
                else if(r < 0.15) { type='trap'; label='T'; }
                else if(r < 0.25) { type='heal'; label='H'; }
                else { type='question'; label='f(x)'; }

                const div = document.createElement('div');
                div.className = `cell ${type}`;
                div.id = `c-${i}`;
                div.innerHTML = label;
                grid.appendChild(div);
            }
            window.addEventListener('resize', () => this.draw());
            setTimeout(() => this.draw(), 300);
        },

        getXY(idx) {
            const el = document.getElementById(`c-${idx}`);
            const r = el.getBoundingClientRect();
            const v = document.getElementById('viewport').getBoundingClientRect();
            return { x: r.left - v.left + r.width/2, y: r.top - v.top + r.height/2 };
        },

        draw() {
            const path = document.getElementById('path-line');
            let d = "";
            for(let i=0; i<50; i++) d += (i===0 ? "M " : "L ") + `${this.getXY(i).x} ${this.getXY(i).y} `;
            path.setAttribute("d", d);
            this.sync();
        },

        sync() {
            const c = this.getXY(this.pos);
            const p = document.getElementById('player');
            p.style.left = c.x + 'px'; p.style.top = c.y + 'px';
            document.getElementById('hp').innerText = this.hp;
            document.getElementById('pos').innerText = this.pos;
            document.querySelectorAll('.cell').forEach(el => el.classList.remove('active'));
            document.getElementById(`c-${this.pos}`).classList.add('active');
            document.getElementById(`c-${this.pos}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        },

        async roll() {
            if(this.moving) return;
            this.moving = true;
            document.getElementById('roll-btn').disabled = true;
            const val = Math.floor(Math.random()*6) + 1;
            for(let i=0; i<8; i++) {
                document.getElementById('dice-val').innerText = Math.floor(Math.random()*6)+1;
                await new Promise(r => setTimeout(r, 60));
            }
            document.getElementById('dice-val').innerText = val;
            for(let i=0; i<val; i++) {
                if(this.pos < 49) { this.pos++; this.sync(); await new Promise(r => setTimeout(r, 200)); }
            }
            this.check();
        },

        check() {
            const el = document.getElementById(`c-${this.pos}`).classList;
            if(el.contains('finish')) { alert("KAZANDIN!"); location.reload(); }
            else if(this.portals[this.pos]) {
                this.msg("PORTAL!", "var(--portal)");
                setTimeout(() => { this.pos = this.portals[this.pos]; this.sync(); this.end(); }, 600);
            } else if(el.contains('trap')) {
                this.hp -= 15; this.fx('error'); this.msg("-15 HP", "var(--danger)"); this.end();
            } else if(el.contains('heal')) {
                this.hp = Math.min(100, this.hp+20); this.fx('success'); this.msg("+20 HP", "var(--success)"); this.end();
            } else if(el.contains('question')) { this.ask(); }
            else this.end();
        },

        ask() {
            const r = Math.random();
            let q, a;
            if(r < 0.4) {
                const v = Math.floor(Math.random()*80)+2;
                q = `f(x) birim fonksiyondur.<br><b>f(${v}) = ?</b>`; a = v;
            } else if(r < 0.7) {
                const v = Math.floor(Math.random()*40)+1;
                q = `f(x) sabit fonksiyondur.<br>f(5)=${v} ise <b>f(2026)=?</b>`; a = v;
            } else {
                const m = Math.floor(Math.random()*4)+2, n = Math.floor(Math.random()*10), x = Math.floor(Math.random()*5);
                q = `f(x) = ${m}x + ${n}<br><b>f(${x}) = ?</b>`; a = m*x+n;
            }
            this.ans = a;
            document.getElementById('q-text').innerHTML = q;
            document.getElementById('q-input').value = '';
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => document.getElementById('q-input').focus(), 100);
        },

        submit() {
            const val = parseInt(document.getElementById('q-input').value);
            document.getElementById('modal').style.display = 'none';
            if(val === this.ans) { this.fx('success'); this.msg("DOĞRU!", "var(--success)"); }
            else { this.hp -= 20; this.fx('error'); this.msg(`YANLIŞ! Cevap: ${this.ans}`, "var(--danger)"); }
            this.end();
        },

        fx(t) {
            document.body.className = `flash-${t}`;
            setTimeout(() => document.body.className = '', 500);
        },

        msg(t, c) {
            const m = document.getElementById('status');
            m.innerText = t; m.style.color = c;
        },

        end() {
            this.sync();
            if(this.hp <= 0) { alert("OYUN BİTTİ!"); location.reload(); }
            this.moving = false;
            document.getElementById('roll-btn').disabled = false;
        }
    };
    window.onload = () => game.init();
</script>
</body>
</html>
