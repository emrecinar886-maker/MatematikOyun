<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fonksiyon Yolu: Neon Edition</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #818cf8;
            --success: #10b981;
            --danger: #f43f5e;
            --portal: #d946ef;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        /* Geri Bildirim Efektleri */
        .flash-success { animation: flashG 0.5s ease-out; }
        .flash-error { animation: flashR 0.5s ease-out, shake 0.4s; }
        @keyframes flashG { 0% { box-shadow: inset 0 0 100px var(--success); } 100% { box-shadow: inset 0 0 0 transparent; } }
        @keyframes flashR { 0% { box-shadow: inset 0 0 100px var(--danger); } 100% { box-shadow: inset 0 0 0 transparent; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Ekranlar */
        .screen {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;
        }
        .screen h1 { font-size: 3rem; font-weight: 900; background: linear-gradient(to right, var(--accent), var(--portal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }

        /* Oyun Alanı */
        .game-wrapper { display: none; width: 100vw; height: 100vh; max-width: 1000px; padding: 20px; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-group { display: flex; gap: 20px; }
        .stat { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--accent); display: block; }

        #board-container { position: relative; flex-grow: 1; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; border: 1px solid #334155; }
        #board-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        #board-grid { 
            display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(5, 1fr);
            width: 100%; height: 100%; gap: 8px; padding: 15px;
        }

        .cell {
            background: #1e293b; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: bold; color: #64748b; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
        }
        .cell-num { position: absolute; top: 4px; left: 4px; opacity: 0.3; }
        .cell.active { border-color: var(--accent); background: #334155; transform: translateY(-2px); }
        .cell.portal { border-color: var(--portal); color: var(--portal); }
        .cell.trap { border-color: var(--danger); }
        .cell.heal { border-color: var(--success); }

        #player {
            width: 35px; height: 35px; background: white; border-radius: 10px;
            position: absolute; z-index: 100; transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px var(--accent); border: 3px solid var(--accent);
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;
        }

        .controls { height: 120px; display: flex; align-items: center; justify-content: center; gap: 30px; }
        .btn {
            padding: 15px 40px; border-radius: 15px; border: none; background: var(--accent); color: white;
            font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #4f46e5; transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #4f46e5; }
        #dice-result { font-size: 3rem; font-weight: 900; color: white; text-shadow: 0 0 15px var(--accent); }

        /* Soru Paneli */
        #q-overlay {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            z-index: 3000; align-items: center; justify-content: center; padding: 20px;
        }
        .q-card {
            background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 450px;
            border: 2px solid var(--accent); text-align: center;
        }
        .q-card input {
            width: 100%; padding: 15px; margin: 20px 0; background: var(--bg); border: 1px solid #334155;
            color: white; font-size: 2rem; border-radius: 12px; text-align: center; outline: none;
        }

        @media (max-width: 768px) {
            #board-grid { gap: 4px; padding: 8px; }
            .cell { font-size: 0.4rem; border-radius: 6px; }
            .header { margin-bottom: 10px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>Matematik Fonksiyon Oyunu</h1>
        <p style="margin-bottom: 2rem; color: #94a3b8;">Fonksiyonlar labirentinde hayatta kalabilir misin?</p>
        <button class="btn" onclick="game.init()">OYUNA BAŞLA</button>
    </div>

    <div class="game-wrapper" id="game-ui">
        <div class="header">
            <div class="stat-group">
                <div class="stat"><span class="stat-label">CAN</span><span id="hp" class="stat-value" style="color:var(--success)">100</span></div>
                <div class="stat"><span class="stat-label">KONUM</span><span id="pos-val" class="stat-value">0</span></div>
            </div>
            <div id="status-msg" style="font-weight: bold; color: var(--accent);">Zar Bekleniyor...</div>
        </div>

        <div id="board-container">
            <svg id="board-svg">
                <path id="main-path" fill="none" stroke="rgba(129, 140, 248, 0.2)" stroke-width="4" stroke-dasharray="10,10" />
                <path id="portal-lines" fill="none" stroke="var(--portal)" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />
            </svg>
            <div id="board-grid"></div>
            <div id="player">👾</div>
        </div>

        <div class="controls">
            <div id="dice-result">?</div>
            <button class="btn" id="roll-btn" onclick="game.roll()">ZAR AT</button>
        </div>
    </div>

    <div id="q-overlay">
        <div class="q-card">
            <div id="q-title" style="color: var(--accent); font-weight: bold; margin-bottom: 10px;">FONKSİYON SORUSU</div>
            <div id="q-text" style="font-size: 1.8rem; line-height: 1.4; margin-bottom: 20px;"></div>
            <input type="number" id="q-input" placeholder="?">
            <button class="btn" style="width: 100%" onclick="game.submitAnswer()">ONAYLA</button>
        </div>
    </div>

<script>
    const game = {
        hp: 100, pos: 0, isMoving: false, cells: [],
        portals: { 7: 18, 24: 36, 12: 2, 43: 31 }, // Giriş: Çıkış (bazıları geri atar)

        init() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            
            const grid = document.getElementById('board-grid');
            grid.innerHTML = '';
            this.cells = [];

            for(let i=0; i<50; i++) {
                let type = 'normal', label = '';
                const r = Math.random();
                
                if(i === 0) label = 'START';
                else if(i === 49) { type = 'finish'; label = 'BİTİŞ'; }
                else if(this.portals[i]) { type = 'portal'; label = 'PORTAL'; }
                else if(r < 0.15) { type = 'trap'; label = 'TUZAK'; }
                else if(r < 0.25) { type = 'heal'; label = 'İKSİR'; }
                else { type = 'question'; label = 'f(x)'; }

                this.cells.push(type);
                const div = document.createElement('div');
                div.className = `cell ${type}`;
                div.id = `c-${i}`;
                div.innerHTML = `<span class="cell-num">${i}</span>${label}`;
                grid.appendChild(div);
            }

            setTimeout(() => { this.drawPaths(); this.update(); }, 100);
        },

        getCoords(idx) {
            const el = document.getElementById(`c-${idx}`);
            const rect = el.getBoundingClientRect();
            const cont = document.getElementById('board-container').getBoundingClientRect();
            return {
                x: rect.left - cont.left + rect.width/2,
                y: rect.top - cont.top + rect.height/2
            };
        },

        drawPaths() {
            const mainPath = document.getElementById('main-path');
            const portalPath = document.getElementById('portal-lines');
            let d = "";
            for(let i=0; i<50; i++) {
                const c = this.getCoords(i);
                d += (i===0 ? "M " : "L ") + `${c.x} ${c.y} `;
            }
            mainPath.setAttribute("d", d);

            let pd = "";
            Object.keys(this.portals).forEach(s => {
                const start = this.getCoords(s);
                const end = this.getCoords(this.portals[s]);
                pd += `M ${start.x} ${start.y} Q ${(start.x+end.x)/2} ${(start.y+end.y)/2 - 50} ${end.x} ${end.y} `;
            });
            portalPath.setAttribute("d", pd);
        },

        update() {
            const c = this.getCoords(this.pos);
            const p = document.getElementById('player');
            p.style.left = c.x + 'px';
            p.style.top = c.y + 'px';
            
            document.getElementById('hp').innerText = this.hp;
            document.getElementById('pos-val').innerText = this.pos;

            document.querySelectorAll('.cell').forEach(el => el.classList.remove('active'));
            document.getElementById(`c-${this.pos}`).classList.add('active');
        },

        async roll() {
            if(this.isMoving) return;
            this.isMoving = true;
            document.getElementById('roll-btn').disabled = true;

            const val = Math.floor(Math.random()*6) + 1;
            const diceEl = document.getElementById('dice-result');
            
            // Zar animasyonu simülasyonu
            for(let i=0; i<10; i++) {
                diceEl.innerText = Math.floor(Math.random()*6)+1;
                await new Promise(r => setTimeout(r, 50));
            }
            diceEl.innerText = val;

            for(let i=0; i<val; i++) {
                if(this.pos < 49) {
                    this.pos++;
                    this.update();
                    await new Promise(r => setTimeout(r, 200));
                }
            }
            this.processCell();
        },

        processCell() {
            const type = this.cells[this.pos];
            if(type === 'finish') {
                alert("TEBRİKLER! Labirenti tamamladın.");
                location.reload();
            } else if(this.portals[this.pos]) {
                this.msg("Işınlanıyorsun!", "var(--portal)");
                setTimeout(() => { this.pos = this.portals[this.pos]; this.update(); this.endTurn(); }, 600);
            } else if(type === 'trap') {
                this.hp -= 15;
                this.flash('error');
                this.msg("-15 CAN (TUZAK)", "var(--danger)");
                this.endTurn();
            } else if(type === 'heal') {
                this.hp = Math.min(100, this.hp + 20);
                this.flash('success');
                this.msg("+20 CAN (İKSİR)", "var(--success)");
                this.endTurn();
            } else if(type === 'question') {
                this.askQuestion();
            } else {
                this.endTurn();
            }
        },

        askQuestion() {
            const r = Math.random();
            let q, a;
            if(r < 0.3) {
                const v = Math.floor(Math.random()*50)+1;
                q = `f(x) birim fonksiyondur.<br>f(${v}) = ?`; a = v;
            } else if(r < 0.6) {
                const v = Math.floor(Math.random()*25);
                q = `f(x) sabit fonksiyondur.<br>f(1)=${v} ise f(100)=?`; a = v;
            } else {
                const m = Math.floor(Math.random()*4)+2, n = Math.floor(Math.random()*10), x = Math.floor(Math.random()*5);
                q = `f(x) = ${m}x + ${n}<br>f(${x}) = ?`; a = m*x+n;
            }
            this.currentAns = a;
            document.getElementById('q-text').innerHTML = q;
            document.getElementById('q-input').value = '';
            document.getElementById('q-overlay').style.display = 'flex';
            document.getElementById('q-input').focus();
        },

        submitAnswer() {
            const val = parseInt(document.getElementById('q-input').value);
            document.getElementById('q-overlay').style.display = 'none';
            if(val === this.currentAns) {
                this.flash('success');
                this.msg("DOĞRU!", "var(--success)");
            } else {
                this.hp -= 20;
                this.flash('error');
                this.msg(`YANLIŞ! Cevap: ${this.currentAns}`, "var(--danger)");
            }
            this.endTurn();
        },

        flash(type) {
            const b = document.body;
            b.classList.remove('flash-success', 'flash-error');
            void b.offsetWidth; // reflow
            b.classList.add(type === 'success' ? 'flash-success' : 'flash-error');
        },

        msg(t, c) {
            const m = document.getElementById('status-msg');
            m.innerText = t; m.style.color = c;
        },

        endTurn() {
            this.update();
            if(this.hp <= 0) {
                alert("Canın bitti! Baştan başlıyorsun.");
                location.reload();
            }
            this.isMoving = false;
            document.getElementById('roll-btn').disabled = false;
        }
    };

    window.onresize = () => game.drawPaths();
</script>
</body>
</html>
