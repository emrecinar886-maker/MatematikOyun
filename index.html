<!DOCTYPE html><html lang="tr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kod Kırıcılar Oyun Tahtası</title>
    <style>
        /* CSS Reset ve Temel Ayarlar */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }
        
        h1 { color: #f8fafc; margin-bottom: 20px; text-align: center; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        h2 { color: #cbd5e1; margin-bottom: 15px; font-size: 1.2rem; border-left: 4px solid #38bdf8; padding-left: 10px; }
        
        .main_container { display: flex; gap: 30px; width: 100%; max-width: 1300px; margin-top: 10px; }
        .panel { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
        .left_panel { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 350px; }
        .right_panel { flex: 2; display: flex; justify-content: center; align-items: center; background: rgba(30, 41, 59, 0.5); border-radius: 16px; padding: 20px; }

        .instruction_box { background: #1e1b4b; border: 2px solid #4f46e5; padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { border-color: #4f46e5; } 50% { border-color: #38bdf8; } 100% { border-color: #4f46e5; } }

        /* Oyun Tahtası */
        .board_grid { display: grid; grid-template-columns: repeat(7, 90px); grid-template-rows: repeat(7, 90px); gap: 8px; background-color: #334155; border: 4px solid #1e293b; padding: 10px; border-radius: 12px; }
        .tile { background-color: #1e293b; border: 1px solid #475569; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; font-weight: 500; text-align: center; position: relative; transition: all 0.3s; color: #94a3b8; }
        
        .tile.corner_box { background-color: #312e81; color: #fff; font-weight: 700; border: 2px solid #6366f1; }
        .tile.question_easy { border-top: 4px solid #22c55e; }
        .tile.question_mid { border-top: 4px solid #eab308; }
        .tile.question_hard { border-top: 4px solid #ef4444; }
        .tile.penalty_box { border-top: 4px solid #991b1b; }
        .tile.reward_box { border-top: 4px solid #3b82f6; }
        .tile.ulti_box { border: 2px dashed #f59e0b; background: #451a03; color: #fbbf24; }
        .tile.mine_trap { background-color: #450a0a !important; border: 2px solid #ef4444; }

        /* Grid Konumları */
        .pos_0 { grid-column: 1; grid-row: 1; } .pos_1 { grid-column: 2; grid-row: 1; } .pos_2 { grid-column: 3; grid-row: 1; } .pos_3 { grid-column: 4; grid-row: 1; } .pos_4 { grid-column: 5; grid-row: 1; } .pos_5 { grid-column: 6; grid-row: 1; }
        .pos_6 { grid-column: 7; grid-row: 1; } .pos_7 { grid-column: 7; grid-row: 2; } .pos_8 { grid-column: 7; grid-row: 3; } .pos_9 { grid-column: 7; grid-row: 4; } .pos_10 { grid-column: 7; grid-row: 5; } .pos_11 { grid-column: 7; grid-row: 6; }
        .pos_12 { grid-column: 7; grid-row: 7; } .pos_13 { grid-column: 6; grid-row: 7; } .pos_14 { grid-column: 5; grid-row: 7; } .pos_15 { grid-column: 4; grid-row: 7; } .pos_16 { grid-column: 3; grid-row: 7; } .pos_17 { grid-column: 2; grid-row: 7; }
        .pos_18 { grid-column: 1; grid-row: 7; } .pos_19 { grid-column: 1; grid-row: 6; } .pos_20 { grid-column: 1; grid-row: 5; } .pos_21 { grid-column: 1; grid-row: 4; } .pos_22 { grid-column: 1; grid-row: 3; } .pos_23 { grid-column: 1; grid-row: 2; }

        .player_token { width: 24px; height: 24px; border-radius: 50%; position: absolute; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.8); transition: all 0.3s ease-in-out; z-index: 100; }
        #token_1 { background: radial-gradient(circle, #38bdf8, #0284c7); bottom: 8px; left: 8px; }
        #token_2 { background: radial-gradient(circle, #f43f5e, #be123c); bottom: 8px; right: 8px; }

        .ulti_container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ulti_btn { background: #334155; color: #94a3b8; border: 1px solid #475569; padding: 8px; border-radius: 6px; font-size: 11px; cursor: not-allowed; opacity: 0.5; transition: 0.3s; }
        .ulti_btn.active { background: #f59e0b; color: #000; border-color: #fbbf24; cursor: pointer; opacity: 1; font-weight: bold; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }

        .btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 16px; width: 100%; margin-top: 10px; box-shadow: 0 4px 0 #1e40af; position: relative; }
        .btn:disabled { background: #475569; box-shadow: none; opacity: 0.7; cursor: not-allowed; }

        .log_box { height: 150px; overflow-y: auto; background-color: #0f172a; border: 1px solid #334155; padding: 10px; font-size: 12px; border-radius: 8px; }
        
        .modal_overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.9); justify-content: center; align-items: center; z-index: 2000; }
        .modal_content { background-color: #1e293b; padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; text-align: center; }
        .modal_input { width: 100%; padding: 12px; margin: 15px 0; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 8px; text-align: center; }

        #admin_trigger { position: fixed; bottom: 0; right: 0; width: 10px; height: 10px; cursor: default; z-index: 9999; }
        #admin_panel { display: none; position: fixed; bottom: 20px; right: 20px; background: #1e293b; border: 2px solid #ef4444; padding: 15px; border-radius: 12px; z-index: 10000; width: 250px; box-shadow: 0 0 20px #000; }
        .admin_input { width: 100%; background: #000; color: #22c55e; border: 1px solid #444; font-family: monospace; padding: 5px; margin-bottom: 10px; }

        #intro_screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; text-align: center; }
        .intro_content { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #38bdf8; max-width: 500px; }
        .warning_text { color: #f59e0b; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .mode_select { display: flex; gap: 15px; margin-top: 20px; }
        .btn_mode { background: #334155; border: 1px solid #38bdf8; color: white; padding: 15px; border-radius: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .btn_mode:hover { background: #38bdf8; color: #000; }
    </style></head><body>

    <div id="intro_screen">
        <div class="intro_content">
            <h1 style="border:none">Kod Kırıcılar</h1>
            <p class="warning_text">⚠️ UYARI: Bu site sadece PC (Bilgisayar) uyumludur.</p>
            <p>Oyun modunu seçerek başlayın:</p>
            <div class="mode_select">
                <button class="btn_mode" onclick="startGame('pvp')">👤 PvP (Arkadaşınla)</button>
                <button class="btn_mode" onclick="startGame('pvai')">🤖 PvAI (AI'ya Karşı)</button>
            </div>
        </div>
    </div>

    <h1>Kod Kırıcılar: Ulti Edition</h1>

    <div class="main_container">
        <div class="left_panel">
            <div class="instruction_box"><h3 id="instruction_text">Oyuncu 1: 3 Adet Mayın Döşe!</h3></div>

            <div class="panel">
                <h2>Envanter & Ulti</h2>
                <div class="ulti_container" id="ulti_panel">
                    <button class="ulti_btn" id="ulti_0" onclick="useUlti(0)">🚀 ROKET (2x Zar)</button>
                    <button class="ulti_btn" id="ulti_1" onclick="useUlti(1)">❄️ KODES (Dondur)</button>
                    <button class="ulti_btn" id="ulti_2" onclick="useUlti(2)">🛡️ KALKAN (+5 Puan)</button>
                    <button class="ulti_btn" id="ulti_3" onclick="useUlti(3)">💥 BOMBA (Rastgele Mayın)</button>
                </div>
            </div>

            <div class="panel">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <div style="color: #38bdf8; font-weight: 800;">P1: <span id="score_1">0</span></div>
                    <div id="p2_label" style="color: #f43f5e; font-weight: 800;">P2: <span id="score_2">0</span></div>
                </div>
                <div id="dice_result" style="font-size: 32px; text-align: center; font-weight: 900; color: #38bdf8;">?</div>
                <button id="btn_roll" class="btn" disabled>ZARI FIRLAT</button>
            </div>

            <div class="panel">
                <div id="game_log" class="log_box"></div>
            </div>
        </div>

        <div class="right_panel">
            <div class="board_grid" id="game_board"></div>
        </div>
    </div>

    <div id="action_modal" class="modal_overlay">
        <div class="modal_content">
            <h2 id="modal_title"></h2>
            <p id="modal_desc"></p>
            <input type="text" id="modal_input" class="modal_input">
            <button id="modal_btn" class="btn">ONAYLA</button>
        </div>
    </div>

    <div id="admin_trigger" onclick="checkAdmin()"></div>
    <div id="admin_panel">
        <h3 style="color: #ef4444; font-size: 12px; margin-bottom: 5px;">CORE SYSTEM DEBUG</h3>
        <input type="text" id="admin_cmd" class="admin_input" placeholder="Komut yaz...">
        <div style="font-size: 10px; color: #94a3b8;">Örn: setscore 50 / move 10 / win</div>
        <button onclick="execAdmin()" class="btn" style="padding: 5px; font-size: 12px;">EXEC</button>
        <button onclick="document.getElementById('admin_panel').style.display='none'" class="btn btn_danger" style="padding: 5px; font-size: 12px; background: #444;">KAPAT</button>
    </div>

    <script>
        const WIN_SCORE = 60;
        let current_state = "setup";
        let active_player = 1;
        let mines_to_place = 3;
        let next_roll_multiplier = 1;
        let active_question = { ans: "", pts: 0 };
        let game_mode = "pvp"; 

        const player_1 = { id: 1, pos: 0, score: 0, frozen: 0, ultis: [false, false, false, false] };
        const player_2 = { id: 2, pos: 0, score: 0, frozen: 0, ultis: [false, false, false, false] };

        const board_tiles = [
            { name: "BAŞLA", type: "corner", class: "corner_box" },
            { name: "Kolay", type: "q_easy", class: "question_easy" },
            { name: "Ceza", type: "penalty", class: "penalty_box" },
            { name: "Orta", type: "q_mid", class: "question_mid" },
            { name: "ULTİ", type: "ulti", class: "ulti_box" },
            { name: "Zor", type: "q_hard", class: "question_hard" },
            { name: "HAN", type: "corner", class: "corner_box" },
            { name: "Kolay", type: "q_easy", class: "question_easy" },
            { name: "Orta", type: "q_mid", class: "question_mid" },
            { name: "Ceza", type: "penalty", class: "penalty_box" },
            { name: "ULTİ", type: "ulti", class: "ulti_box" },
            { name: "Zor", type: "q_hard", class: "question_hard" },
            { name: "ŞANS", type: "corner", class: "corner_box" },
            { name: "Kolay", type: "q_easy", class: "question_easy" },
            { name: "Ödül", type: "reward", class: "reward_box" },
            { name: "Orta", type: "q_mid", class: "question_mid" },
            { name: "ULTİ", type: "ulti", class: "ulti_box" },
            { name: "Zor", type: "q_hard", class: "question_hard" },
            { name: "KODES", type: "corner", class: "corner_box" },
            { name: "Kolay", type: "q_easy", class: "question_easy" },
            { name: "Orta", type: "q_mid", class: "question_mid" },
            { name: "Ödül", type: "reward", class: "reward_box" },
            { name: "ULTİ", type: "ulti", class: "ulti_box" },
            { name: "Zor", type: "q_hard", class: "question_hard" }
        ];

        function startGame(mode) {
            game_mode = mode;
            if(mode === "pvai") {
                document.getElementById("p2_label").innerHTML = "AI: <span id='score_2'>0</span>";
            }
            document.getElementById("intro_screen").style.display = "none";
            init_board();
        }

        function init_board() {
            const board_el = document.getElementById("game_board");
            board_tiles.forEach((tile, index) => {
                const div = document.createElement("div");
                div.className = `tile ${tile.class} pos_${index}`;
                div.id = `tile_${index}`;
                div.innerHTML = `<span>${tile.name}</span>`;
                div.onclick = () => handle_tile_click(index);
                board_el.appendChild(div);
            });
            document.getElementById("tile_0").innerHTML += `<div id="token_1" class="player_token"></div><div id="token_2" class="player_token"></div>`;
        }

        function handle_tile_click(index) {
            if (current_state !== "setup") return;
            if ([0, 6, 12, 18].includes(index) || board_tiles[index].is_mine) return;
            
            board_tiles[index].is_mine = true;
            document.getElementById(`tile_${index}`).classList.add("mine_trap");
            mines_to_place--;
            
            if (mines_to_place > 0) {
                document.getElementById("instruction_text").innerText = `Oyuncu 1: ${mines_to_place} Mayın Daha!`;
            } else {
                if(game_mode === "pvai") {
                    for(let i=0; i<3; i++) {
                        let r = Math.floor(Math.random() * 23) + 1;
                        if(![0, 6, 12, 18].includes(r) && !board_tiles[r].is_mine) {
                            board_tiles[r].is_mine = true;
                            document.getElementById(`tile_${r}`).classList.add("mine_trap");
                        } else { i--; }
                    }
                    log("AI 3 adet gizli mayın yerleştirdi!");
                    current_state = "playing"; update_turn_ui(); document.getElementById("btn_roll").disabled = false;
                } else {
                    current_state = "playing"; update_turn_ui(); document.getElementById("btn_roll").disabled = false;
                }
            }
        }

        function update_turn_ui() {
            const p = active_player === 1 ? player_1 : player_2;
            const color = active_player === 1 ? "#38bdf8" : "#f43f5e";
            const pName = (game_mode === "pvai" && active_player === 2) ? "AI" : `Oyuncu ${active_player}`;
            
            document.getElementById("instruction_text").innerText = `${pName}: Sıra Sende!`;
            document.getElementById("instruction_text").style.color = color;
            
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`ulti_${i}`);
                if(p.ultis[i] && (active_player === 1 || game_mode === "pvp")) { 
                    btn.classList.add("active"); btn.disabled = false; 
                }
                else { btn.classList.remove("active"); btn.disabled = true; }
            }

            if(game_mode === "pvai" && active_player === 2 && current_state === "playing") {
                document.getElementById("btn_roll").disabled = true;
                setTimeout(ai_turn, 1500);
            }
        }

        function ai_turn() {
            if(player_2.frozen > 0) { 
                player_2.frozen--; 
                log("AI kilitli, sıra geçiliyor."); 
                switch_turn(); 
                return; 
            }
            
            for(let i=0; i<4; i++) {
                if(player_2.ultis[i] && Math.random() < 0.2) {
                    useUlti(i);
                    break;
                }
            }

            let roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById("dice_result").innerText = roll;
            let move = roll * next_roll_multiplier;
            next_roll_multiplier = 1;
            move_player(player_2, move);
        }

        function useUlti(type) {
            const p = active_player === 1 ? player_1 : player_2;
            const opp = active_player === 1 ? player_2 : player_1;
            if(!p.ultis[type]) return;
            p.ultis[type] = false;
            if(type === 0) { next_roll_multiplier = 2; log("ROKET Aktif: Gelecek zar 2 katı sayılacak."); }
            if(type === 1) { opp.frozen = 1; log("KODES Aktif: Rakip 1 tur kilitlendi."); }
            if(type === 2) { p.score += 5; log("KALKAN Aktif: +5 Puan kazanıldı."); update_score(); }
            if(type === 3) { 
                let r = Math.floor(Math.random() * 23) + 1;
                board_tiles[r].is_mine = true;
                document.getElementById(`tile_${r}`).classList.add("mine_trap");
                log("BOMBA: Rastgele bir hücreye mayın döşendi.");
            }
            update_turn_ui();
        }

        document.getElementById("btn_roll").onclick = function() {
            const p = active_player === 1 ? player_1 : player_2;
            if(p.frozen > 0) { p.frozen--; log(`P${p.id} kilitli, geçiliyor.`); switch_turn(); return; }
            this.disabled = true;
            let roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById("dice_result").innerText = roll;
            let move = roll * next_roll_multiplier;
            next_roll_multiplier = 1;
            move_player(p, move);
        };

        // AKICI HAREKET FONKSİYONU
        async function move_player(p, steps) {
            const token = document.getElementById(`token_${p.id}`);
            for (let i = 0; i < steps; i++) {
                p.pos = (p.pos + 1) % 24;
                const nextTile = document.getElementById(`tile_${p.pos}`);
                nextTile.appendChild(token);
                await new Promise(resolve => setTimeout(resolve, 300)); // Adım hızı
            }
            setTimeout(() => check_tile(p), 300);
        }

        function check_tile(p) {
            const tile = board_tiles[p.pos];
            const pName = (game_mode === "pvai" && p.id === 2) ? "AI" : `P${p.id}`;

            if(tile.is_mine) { 
                log(`BOOM! ${pName} mayına bastı.`); 
                p.frozen = 1; 
                tile.is_mine = false; 
                document.getElementById(`tile_${p.pos}`).classList.remove("mine_trap");
                switch_turn(); 
                return; 
            }

            if(tile.type === "ulti") {
                let r = Math.floor(Math.random() * 4);
                p.ultis[r] = true;
                log(`${pName} bir ULTİ kazandı!`);
                switch_turn();
            } else if(tile.type.startsWith("q_")) {
                let diff = 1;
                if(tile.type === "q_mid") diff = 2;
                if(tile.type === "q_hard") diff = 3;
                
                if(game_mode === "pvai" && p.id === 2) {
                    setTimeout(() => {
                        if(Math.random() < 0.7) {
                            let pts = diff === 1 ? 3 : (diff === 2 ? 5 : 8);
                            player_2.score += pts;
                            log(`AI soruyu doğru yanıtladı! +${pts} Puan.`);
                        } else {
                            log(`AI soruyu yanlış yanıtladı.`);
                        }
                        update_score();
                        switch_turn();
                    }, 1000);
                } else {
                    show_question(p, diff);
                }
            } else {
                switch_turn();
            }
        }

        function show_question(player, difficulty) {
            const modal = document.getElementById("action_modal");
            const modal_title = document.getElementById("modal_title");
            const modal_desc = document.getElementById("modal_desc");
            const modal_input = document.getElementById("modal_input");
            const modal_btn = document.getElementById("modal_btn");

            modal.style.display = "flex";
            modal_input.value = "";
            modal_input.focus();
            
            const constant = Math.floor(Math.random() * 40) + 10; 
            const pass_arr = [1, 2, 3, 4];
            
            if (difficulty === 1) { 
                const test_val = Math.floor(Math.random() * 5) + 1;
                active_question = { ans: (test_val + constant).toString(), pts: 3 };
                modal_title.innerText = "Kolay Soru";
                modal_desc.innerText = `Fonksiyon: f(x) = x + ${constant}. f(${test_val}) kaçtır?`;
            } 
            else if (difficulty === 2) { 
                let encrypted = "";
                pass_arr.forEach(num => { encrypted += (num + constant).toString(); });
                active_question = { ans: encrypted, pts: 5 };
                modal_title.innerText = "Orta Soru (Şifreleme)";
                modal_desc.innerText = `Fonksiyon: f(x) = x + ${constant}. "${pass_arr.join("")}" şifresini şifreleyin.`;
            } 
            else if (difficulty === 3) { 
                let encrypted = "";
                pass_arr.forEach(num => { encrypted += (num + constant).toString(); });
                active_question = { ans: pass_arr.join(""), pts: 8 };
                modal_title.innerText = "Zor Soru (Deşifre)";
                modal_desc.innerText = `Fonksiyon: f(x) = x + ${constant}. Gelen şifre: "${encrypted}". Orijinal şifre (x değerleri) nedir?`;
            }
            
            modal_btn.onclick = () => verify_answer(player);
        }

        function verify_answer(player) {
            const user_ans = document.getElementById("modal_input").value.trim();
            if (user_ans === active_question.ans) {
                player.score += active_question.pts;
                log(`Doğru! P${player.id}, ${active_question.pts} puan kazandı.`);
            } else {
                log(`Yanlış! Doğrusu: ${active_question.ans}`);
            }
            update_score();
            document.getElementById("action_modal").style.display = "none";
            switch_turn();
        }

        function switch_turn() {
            active_player = active_player === 1 ? 2 : 1;
            update_turn_ui();
            if(game_mode === "pvp" || active_player === 1) {
                document.getElementById("btn_roll").disabled = false;
            }
        }

        function log(m) {
            const e = document.createElement("div");
            e.innerText = "> " + m;
            const box = document.getElementById("game_log");
            box.prepend(e);
        }

        function update_score() {
            document.getElementById("score_1").innerText = player_1.score;
            document.getElementById("score_2").innerText = player_2.score;
            if(player_1.score >= WIN_SCORE || player_2.score >= WIN_SCORE) {
                const winner = player_1.score >= WIN_SCORE ? "Oyuncu 1" : (game_mode === "pvai" ? "AI" : "Oyuncu 2");
                alert("SİSTEM ELE GEÇİRİLDİ! Kazanan: " + winner);
                location.reload();
            }
        }

        function checkAdmin() {
            let pass = prompt("Sistem Şifresi:");
            if(pass === "ayzofladmin") {
                document.getElementById("admin_panel").style.display = "block";
                log("DEBUG: Admin yetkileri tanımlandı.");
            }
        }

        function execAdmin() {
            let cmd = document.getElementById("admin_cmd").value.split(" ");
            let p = active_player === 1 ? player_1 : player_2;
            if(cmd[0] === "setscore") p.score = parseInt(cmd[1]);
            if(cmd[0] === "move") move_player(p, parseInt(cmd[1]));
            if(cmd[0] === "win") p.score = 60;
            update_score();
            document.getElementById("admin_cmd").value = "";
        }
    </script></body></html>
